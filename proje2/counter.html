<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="box" class="bg-white p-8 rounded-xl shadow text-center transition-colors duration-300">
        <h1 class="text-4xl font-bold text-red-300 my-4 mb-2">Canlı Sayaç</h1>
        <div id="number" class="text-4xl text-blue-300 my-4">0</div>
        <div class="flex gap-4 justify-center">
            <button onclick="change(-1)" class="bg-red-500 text-white px-4 rounded font-bold">-</button>
            <button onclick="change(1)" class="bg-green-500 text-white px-4 rounded font-bold">+</button>
        </div>
    </div>
    <script>
    let count = 0;

    const box = document.getElementById('box');
    const number = document.getElementById('number');

    function change(value) {
        count += value;
        number.textContent = count;

        // Renk seviyesi (100, 200, 300, 400, 500)
        let level = Math.min(Math.abs(count), 5) * 100;

        if (count > 0) {
            box.className =
                `bg-green-${level} p-8 rounded-xl shadow text-center transition-colors duration-300`;
        }
        else if (count < 0) {
            box.className =
                `bg-red-${level} p-8 rounded-xl shadow text-center transition-colors duration-300`;
        }
        else {
            box.className =
                "bg-white p-8 rounded-xl shadow text-center transition-colors duration-300";
        }
    }
</script>
    
</body>
</html>
