<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 flex justify-center">
    <div class="max-w-sm w-full bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-6 text-slate-800">Giriş Yap</h1>
    <form class="space-y-4">
    
    <div>
    <label class="text-xs text-slate-600 block mb-1">E-Posta</label>
    <input class="w-full border p-2 rounded text-sm  focus:outline-none focus:border-blue-500" type="email" placeholder="Eposta adresinizi giriniz..">
    </div>

    <div>

     <label class="text-xs text-slate-600 block mb-1">Şifre</label>
    <input class="w-full border p-2 rounded text-sm  focus:outline-none focus:border-blue-500" type="password"  placeholder="*************">
    </div>

   

    <button type="submit" class="w-full bg-pink-300 text-white  font-semibold py-2 rounded hover:bg-pink-600">Giriş Yap</button>
   </form>

    
</div>
    
</body>
</html>
