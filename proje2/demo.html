<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basit Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <nav class="bg-slate-800 p-4 flex justify-between">
        <div class="font-bold text-blue-400">Merve Daşçi</div>
        <div class="flex gap-4">
            <a href="#" class="hover:text-blue-400">Ana Sayfa</a>
            <a href="#" class="hover:text-blue-400">Hizmetler</a>
            <a href="#" class="hover:text-blue-400">İletişim</a>

    <section class="text-center py-16 px-4">
