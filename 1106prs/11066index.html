<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
    <title>Document</title>
</head>
<body class="p-6 bg-pink-100">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">Readonly ve Opsiyonel arayüz özellikleri</h1>
        <div id="customer-card" class="p-4 border">Yükleniyor</div>
        <div class="mt-4 space-y-2">
            <div >
                <label class="block">İsim Güncelle</label>
                <input type="text" id="inp-name" class="p-1 border">
            </div>
            <div>
                <label class="block">Eposta Güncelle (opsiyonel)</label>
                <input type="text" id="inp-email" class="p-1 border">
            </div>
            <button id="btn-update" class="p-2 bg-blue-100">Bilgileri Güncelle</button>
        </div>

    </div>
    
 <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('script[type="text/typescript"]').forEach(script => {
                const js = window.ts.transpile(script.textContent);
                const newScript = document.createElement('script');
                newScript.textContent=js;
                document.body.appendChild(newScript);
            })
        })
    </script> 

    <script type="text/typescript">
        interface Musteri {
            readonly tcNo:string;
            isim:string;
            eposta?:string;
        }
        const musteri1={
            tcNo:"11112222333",
            isim:"Merve Ahu Beyza"
        }
        const out =document.getElementById('customer-card') as HTMLDivElement;

        const musteriGoster= () => {
        out.innerHTML=`
        <strong>Müşteri Kartı:</strong><br>
        Tc No(readonly): ${musteri1.tcNo}<br>
        İsim ${musteri1.isim}<br>
        Eposta:${musteri1.eposta ? musteri1.eposta : "Eklenmemiş"} `;
        }
        musteriGoster();

        document.getElementById('btn-update').addEventListener('click', () => {
            const nameVal=(document.getElementById('inp-name') as HTMLInputElement).value;
             const emailVal=(document.getElementById('inp-email') as HTMLInputElement).value;
             if(nameVal) {
                musteri1.isim=nameVal;
             }
             if(emailVal) {
                musteri1.eposta = emailVal;
             } else {
                delete musteri1.eposta;
             }
             musteriGoster();


        })

    </script>
</body>
</html>
