<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
    <title>Document</title>
</head>
<body class="p-6 bg-red-100">

    <div class="p-6 border border-purple-300 rounded-xl shadow">
        <h1 class="text-xl pb-3  text-pink-800 font-bold">Arayüz (Interface) Yapısı</h1>
        <div class="mb-4">
            <input id="prod-name" type="text" placeholder="Ürün Adı" class="p-1 border bg-purple-50 rounded-xl">
            <input id="prod-price" type="number" placeholder="Fiyat" class="p-1 border bg-purple-50 rounded-xl">
        </div>
        <button id="btn-add" class="p-2 bg-purple-200">Ürün Ekle</button>
        <ul id="product-list" class="list-disc pl-5 space-y-1 text-pink-800"></ul>
    </div>
    


<script>
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('script[type="text/typescript"]').forEach(script => {
                const js = window.ts.transpile(script.textContent);
                const newScript = document.createElement('script');
                newScript.textContent=js;
                document.body.appendChild(newScript);
            })
        })
    </script> 
    <script type="text/typescript">
        interface Urun{
            id: number;
            ad: string;
            fiyat: number;
        }
        const urunler:Urun[]=[
        {id:1, ad:"Defter", fiyat:40}
         {id:2, ad:"Kalem", fiyat:20}
        
        ]

        const listElement = document.getElementById('product-list') as HTMLLinkElement;
        const listeyiCiz= () =>{
            listElement.innerHTML="";
            urunler.forEach(u=> {
                const li = document.createElement('li');
                li.innerText=u.ad + "- Fiyat: " + u.fiyat + " TL (Urun kodu: "+u.id + ")";
                listElement.appendChild(li);
            })
        }
        listeyiCiz();

        document.getElementById('btn-add').addEventListener('click', () => {
            const nameInp = document.getElementById('prod-name') as HTMLInputElement;
            const priceInp = document.getElementById('prod-price') as HTMLInputElement;

            const adValue= nameInp.value;
            const fiyatValue = Number(priceInp.value);

            if(adValue && !isNaN(fiyatValue)){
                const yeniUrun: Urun= {
                    id:urunler.length+1,
                    ad:adValue,
                    fiyat:fiyatValue
                }
                urunler.push(yeniUrun);
                listeyiCiz();
                nameInp.value="";
                priceInp.value="";
            }

        })

    </script>
</body>
</html>
