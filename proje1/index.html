<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Merhaba Sınıf</h1>
    <button id="change">Değiştir</button>
    <p id="yazi">Merhaba tekrar...</p>
    <script>
        const buton = document.getElementById('change');
        const yazi = document.getElementById('yazi');
        buton.addEventListener('click', function() {
            yazi.textContent= 'Butona Tıklandı';
        });
    </script>

    
        
    
    
    
</body>
</html>
