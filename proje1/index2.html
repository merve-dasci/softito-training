<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Merhaba Arkadaşlar</h1>
    <p id="pr">Javascript Öğreniyorum...</p>
    <button id="myBtn">Değiştir</button>
    <script>
        let tiklamaSayisi = 0;
        const yazi = document.getElementById('pr');
        const buton = document.getElementById('myBtn');
        buton.addEventListener('click', function(){
            yazi.textContent = "Javascript Öğrendim...";
            tiklamaSayisi++;
            if(tiklamaSayisi == 1){
                yazi.textContent = "Javascript Öğrendim...";
            } else {
                yazi.textContent = "Beyza Mensur";
            }
        });
    </script>
</body>
</html>
